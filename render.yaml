services:
  - type: web
    name: klusai-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: packages/backend
    buildCommand: pip install -r requirements.txt && python -m app.utils.seed_database
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./klusai.db
      - key: PYTHON_VERSION
        value: 3.13.0
